<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HireAI - Login</title>
  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #EFF6FF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    nav {
      background: white;
      padding: 16px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #E2E8F0;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #2563EB;
    }

    .nav-links a {
      text-decoration: none;
      color: #1E293B;
      margin-left: 28px;
      font-size: 15px;
    }

    .nav-links a:hover {
      color: #2563EB;
    }

    /* ── LOGIN WRAPPER ── */
    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .login-box {
      background: white;
      border-radius: 16px;
      border: 1px solid #E2E8F0;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
    }

    .login-box h2 {
      font-size: 26px;
      font-weight: 700;
      color: #1E293B;
      margin-bottom: 6px;
      text-align: center;
    }

    .login-box p {
      font-size: 14px;
      color: #64748B;
      text-align: center;
      margin-bottom: 32px;
    }

    /* ── ROLE SELECTOR ── */
    .role-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .role-btn {
      flex: 1;
      padding: 10px;
      border: 1.5px solid #E2E8F0;
      border-radius: 8px;
      background: white;
      color: #64748B;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .role-btn.active {
      border-color: #2563EB;
      background: #EFF6FF;
      color: #2563EB;
    }

    /* ── FORM ── */
    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1E293B;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #E2E8F0;
      border-radius: 8px;
      font-size: 15px;
      color: #1E293B;
      outline: none;
      transition: border 0.2s;
    }

    .form-group input:focus {
      border-color: #2563EB;
    }

    .forgot {
      text-align: right;
      margin-bottom: 24px;
    }

    .forgot a {
      font-size: 13px;
      color: #2563EB;
      text-decoration: none;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: #2563EB;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .login-btn:hover {
      background: #1D4ED8;
    }

    .divider {
      text-align: center;
      margin: 24px 0;
      font-size: 13px;
      color: #94A3B8;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #E2E8F0;
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .register-link {
      text-align: center;
      font-size: 14px;
      color: #64748B;
    }

    .register-link a {
      color: #2563EB;
      font-weight: 600;
      text-decoration: none;
    }

    /* ── ROLE INFO BOX ── */
    .role-info {
      background: #EFF6FF;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #2563EB;
      margin-bottom: 20px;
      text-align: center;
    }

    /* ── FOOTER ── */
    footer {
      background: #1E293B;
      color: #94A3B8;
      text-align: center;
      padding: 20px;
      font-size: 13px;
    }

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">HireAI</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <!-- LOGIN -->
  <div class="login-wrapper">
    <div class="login-box">

      <h2>Welcome Back</h2>
      <p>Login to your HireAI account</p>

      <!-- ROLE SELECTOR -->
      <div class="role-selector">
        <div class="role-btn active" onclick="selectRole('Admin', this)">Admin</div>
        <div class="role-btn" onclick="selectRole('HR', this)">HR</div>
        <div class="role-btn" onclick="selectRole('Candidate', this)">Candidate</div>
      </div>

      <!-- ROLE INFO -->
      <div class="role-info" id="role-info">
        Logging in as Admin
      </div>

      <!-- FORM -->
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" />
      </div>

      <div class="forgot">
        <a href="#">Forgot password?</a>
      </div>

      <button class="login-btn" onclick="handleLogin()">Login</button>

      <div class="divider">or</div>

      <div class="register-link">
      <a href="register.html">Register here</a>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2024 HireAI. All rights reserved.</p>
  </footer>
    <script>
  function selectRole(role, el) {
    document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('role-info').textContent = 'Logging in as ' + role;
  }

  async function handleLogin() {
    var email = document.querySelector('input[type="email"]').value;
    var password = document.querySelector('input[type="password"]').value;
    var role = document.querySelector('.role-btn.active').textContent.trim().toLowerCase();

    if (!email || !password) {
      alert('Please enter email and password!');
      return;
    }

    try {
      var response = await fetch('https://recruitment-system-w57t.onrender.com/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      var data = await response.json();

      if (response.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        alert('Login successful! Welcome ' + data.user.name);

        if (data.user.role === 'admin') {
          window.location.href = 'admin-dashboard.html';
        } else if (data.user.role === 'hr') {
          window.location.href = 'hr-dashboard.html';
        } else {
          window.location.href = 'candidate-portal.html';
        }
      } else {
        alert(data.message || 'Login failed!');
      }

    } catch (error) {
      alert('Cannot connect to server! Make sure backend is running.');
    }
  }
  </script>

</body>
</html>
