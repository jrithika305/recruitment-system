<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HireAI - Register</title>
  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #EFF6FF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      background: white;
      padding: 16px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #E2E8F0;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      color: #2563EB;
    }

    .nav-links a {
      text-decoration: none;
      color: #1E293B;
      margin-left: 28px;
      font-size: 15px;
    }

    .nav-links a:hover { color: #2563EB; }

    .register-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .register-box {
      background: white;
      border-radius: 16px;
      border: 1px solid #E2E8F0;
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
    }

    .register-box h2 {
      font-size: 26px;
      font-weight: 700;
      color: #1E293B;
      margin-bottom: 6px;
      text-align: center;
    }

    .register-box p {
      font-size: 14px;
      color: #64748B;
      text-align: center;
      margin-bottom: 32px;
    }

    .role-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .role-btn {
      flex: 1;
      padding: 10px;
      border: 1.5px solid #E2E8F0;
      border-radius: 8px;
      background: white;
      color: #64748B;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .role-btn.active {
      border-color: #2563EB;
      background: #EFF6FF;
      color: #2563EB;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1E293B;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #E2E8F0;
      border-radius: 8px;
      font-size: 15px;
      color: #1E293B;
      outline: none;
      transition: border 0.2s;
    }

    .form-group input:focus {
      border-color: #2563EB;
    }

    .register-btn {
      width: 100%;
      padding: 14px;
      background: #2563EB;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .register-btn:hover { background: #1D4ED8; }

    .login-link {
      text-align: center;
      font-size: 14px;
      color: #64748B;
      margin-top: 20px;
    }

    .login-link a {
      color: #2563EB;
      font-weight: 600;
      text-decoration: none;
    }

    .success-box {
      display: none;
      background: #D1FAE5;
      border: 1px solid #6EE7B7;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      color: #065F46;
      margin-bottom: 16px;
      text-align: center;
    }

    .error-box {
      display: none;
      background: #FEE2E2;
      border: 1px solid #FCA5A5;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      color: #991B1B;
      margin-bottom: 16px;
      text-align: center;
    }

    footer {
      background: #1E293B;
      color: #94A3B8;
      text-align: center;
      padding: 20px;
      font-size: 13px;
    }

  </style>
</head>
<body>

  <nav>
    <div class="logo">HireAI</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
    </div>
  </nav>

  <div class="register-wrapper">
    <div class="register-box">

      <h2>Create Account</h2>
      <p>Join HireAI and start your journey</p>

      <div class="role-selector">
        <div class="role-btn active" onclick="selectRole('hr', this)">HR</div>
        <div class="role-btn" onclick="selectRole('candidate', this)">Candidate</div>
      </div>

      <div class="success-box" id="success-box">
        Account created successfully! Redirecting to login...
      </div>

      <div class="error-box" id="error-box"></div>

      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="firstname" placeholder="First name" />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="lastname" placeholder="Last name" />
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter your phone number" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Create a password" />
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmpassword" placeholder="Confirm your password" />
      </div>

      <button class="register-btn" onclick="handleRegister()">
        Create Account
      </button>

      <div class="login-link">
        Already have an account? <a href="login.html">Login here</a>
      </div>

    </div>
  </div>

  <footer>
    <p>© 2024 HireAI. All rights reserved.</p>
  </footer>

  <script>
    var selectedRole = 'hr';

    function selectRole(role, el) {
      selectedRole = role;
      document.querySelectorAll('.role-btn').forEach(function(btn) {
        btn.classList.remove('active');
      });
      el.classList.add('active');
    }

    async function handleRegister() {
      var firstname = document.getElementById('firstname').value.trim();
      var lastname = document.getElementById('lastname').value.trim();
      var email = document.getElementById('email').value.trim();
      var phone = document.getElementById('phone').value.trim();
      var password = document.getElementById('password').value;
      var confirmpassword = document.getElementById('confirmpassword').value;

      var errorBox = document.getElementById('error-box');
      var successBox = document.getElementById('success-box');

      errorBox.style.display = 'none';
      successBox.style.display = 'none';

      if (!firstname || !lastname || !email || !password) {
        errorBox.textContent = 'Please fill in all required fields!';
        errorBox.style.display = 'block';
        return;
      }

      if (password !== confirmpassword) {
        errorBox.textContent = 'Passwords do not match!';
        errorBox.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorBox.textContent = 'Password must be at least 6 characters!';
        errorBox.style.display = 'block';
        return;
      }

      try {
        var response = await fetch('http://localhost:5000/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: firstname + ' ' + lastname,
            email: email,
            phone: phone,
            password: password,
            role: selectedRole
          })
        });

        var data = await response.json();

        if (response.ok) {
          successBox.style.display = 'block';
          setTimeout(function() {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          errorBox.textContent = data.message || 'Registration failed!';
          errorBox.style.display = 'block';
        }

      } catch (error) {
        errorBox.textContent = 'Cannot connect to server! Make sure backend is running.';
        errorBox.style.display = 'block';
      }
    }
  </script>

</body>
</html>
